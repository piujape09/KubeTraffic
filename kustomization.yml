apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Order matters: namespace first, then config/security, then workloads.
resources:
  - manifests/namespace.yml
  - config/configmap.yml
  - config/secret.yml
  - config/nginx-content.yml
  - security/serviceaccount.yml
  - security/role.yml
  - security/rolebinding.yml
  - security/networkpolicy.yml
  - manifests/deployment.yml
  - manifests/service.yml
  - manifests/hpa.yml
  - manifests/ingress.yml
