name: lint

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  kubeconform:
    name: Validate manifests & Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Validate raw manifests
        run: |
          kubeconform -strict -summary -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            config/ manifests/ security/

      - name: Render & validate Helm chart
        run: |
          helm lint helm/kubetraffic
          helm template kubetraffic helm/kubetraffic \
            --set metrics.enabled=true \
            --set metrics.serviceMonitor.enabled=true \
          | kubeconform -strict -summary -ignore-missing-schemas \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
